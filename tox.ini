# tox (https://tox.readthedocs.io/) is a tool for running tests
# in multiple virtualenvs. This configuration file will run the
# test suite on all supported python versions. To use it, "pip install tox"
# and then run "tox" from this directory.

[tox]
envlist = lint, py39, py310, py311, py312

[testenv]
commands =
    pytest {posargs}
changedir = {toxinidir}/tests
passenv = TOX_S3_BUCKET,TOX_ENABLE_AWS
extras = test
allowlist_externals = pytest

[testenv:lint]
changedir = {toxinidir}
skip_install = true
deps = black
commands =
    black --check .
allowlist_externals =
    black

[testenv:release]
changedir = {toxinidir}
skip_install = true
deps =
    build
    twine>=5.0.0
commands =
    python3 -m build
    python3 -m twine upload --repository deepracer-utils dist/*
allowlist_externals =
    python3